<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9839"/>
      <stop offset="100%" style="stop-color:#d97500"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#dark)"/>
  <!-- Camera body -->
  <rect x="14" y="34" width="52" height="34" rx="8" fill="url(#bg)"/>
  <!-- Camera lens -->
  <circle cx="40" cy="51" r="11" fill="#0f172a"/>
  <circle cx="40" cy="51" r="7" fill="#1e293b"/>
  <circle cx="40" cy="51" r="3.5" fill="white" opacity="0.9"/>
  <!-- Camera play triangle (viewfinder) -->
  <polygon points="76,38 88,51 76,64" rx="3" fill="url(#bg)"/>
  <!-- M letter bottom right badge -->
  <rect x="58" y="60" width="28" height="20" rx="6" fill="#0f172a" opacity="0.85"/>
  <text x="72" y="75" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" text-anchor="middle" fill="white">M</text>
</svg>
